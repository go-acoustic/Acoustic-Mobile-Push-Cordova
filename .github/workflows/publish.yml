# Publish the 12 cordova-acoustic-mobile-push* (release) packages to npm using
# npm Trusted Publishers (OIDC).
#
# Note for maintainers: this file is the SOURCE for the public repo's
# (go-acoustic/Acoustic-Mobile-Push-Cordova) `.github/workflows/publish.yml`.
# packageRelease() copies it there under that name on every production
# publish — edits made directly in the public repo are overwritten. In this
# (private) repo the workflow is inert: the repository guard below only
# matches the public repo.
#
# Flow:
#   1. Jenkins syncs plugin source from the private repo's beta build into
#      go-acoustic/Acoustic-Mobile-Push-Cordova, strips the "-beta" suffix
#      from all 12 package names, commits, and pushes a bare-semver tag
#      (e.g. 3.9.134) to that repo.
#   2. Jenkins creates a GitHub Release for that tag with all 12 `npm pack`
#      tarballs attached in a single `gh release create` call.
#   3. This workflow triggers on the tag push, polls the release until all 12
#      tarball assets are attached, downloads them, and publishes each to npm
#      via OIDC with provenance — no npm token stored in GitHub.
#
# Prerequisites:
#   - Each of the 12 cordova-acoustic-mobile-push* (non-beta) packages
#     configured with GitHub as a Trusted Publisher on npmjs.com:
#       repository: go-acoustic/Acoustic-Mobile-Push-Cordova
#       workflow:   publish.yml
#   - Jenkins must push the tag AND create the release with all tarballs
#     attached before this workflow times out.
#   - npm CLI >= 11.5.1 for Trusted Publishers support (upgraded below).
#
# Troubleshooting:
#   - "Timeout waiting for tarballs": Jenkins did not attach all 12 assets to
#     the GitHub Release in time.
#   - "npm publish failed" / ENEEDAUTH: verify Trusted Publishers config on
#     npmjs.com for the specific package that failed.

name: Publish to npm (Trusted Publishers)

on:
  push:
    tags-ignore:
      - '*-beta'  # Only bare semver tags from the release pipeline
  workflow_dispatch:  # Allow manual re-run from the GitHub UI

permissions:
  id-token: write  # Required for OIDC Trusted Publishers
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # Only publish from the public repository — inert everywhere else.
    if: github.repository == 'go-acoustic/Acoustic-Mobile-Push-Cordova'
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate bare semver tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: '${TAG}' is not a bare semver tag — aborting." >&2
            exit 1
          fi

      - name: Verify package metadata
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          PLUGIN_PKG="plugins/cordova-acoustic-mobile-push/package.json"
          PACKAGE_NAME=$(jq -r '.name' "$PLUGIN_PKG")
          PACKAGE_VERSION=$(jq -r '.version' "$PLUGIN_PKG")

          echo "Package name   : $PACKAGE_NAME"
          echo "Package version: $PACKAGE_VERSION"
          echo "Tag            : $TAG"

          if [ "$PACKAGE_NAME" != "cordova-acoustic-mobile-push" ]; then
            echo "ERROR: unexpected package name '${PACKAGE_NAME}'" >&2
            exit 1
          fi
          if [ "$PACKAGE_VERSION" != "$TAG" ]; then
            echo "ERROR: tag '${TAG}' does not match package.json version '${PACKAGE_VERSION}'" >&2
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for Trusted Publishers
        timeout-minutes: 3
        run: |
          set -euo pipefail
          echo "Current npm version: $(npm --version)"
          # Pinned to major 11, not @latest — npm 12 requires Node >=22 and
          # breaks under Node 20 with EBADENGINE.
          npm install -g npm@11
          echo "Upgraded npm version: $(npm --version)"

      - name: Wait for and download tarballs from release
        timeout-minutes: 10
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          EXPECTED_PACKAGES=12
          MAX_RETRIES=60
          RETRY_DELAY=10
          attempt=1
          mkdir -p tarballs

          while [ $attempt -le $MAX_RETRIES ]; do
            echo "Attempt $attempt/$MAX_RETRIES — checking for tarballs on release ${RELEASE_TAG}..."

            RELEASE_JSON=$(gh release view "$RELEASE_TAG" --repo "$REPO" --json assets 2>/dev/null) \
              || RELEASE_JSON='{"assets":[]}'
            ASSET_COUNT=$(echo "$RELEASE_JSON" \
              | jq '[(.assets // [])[] | select(.name | endswith(".tgz"))] | length')

            echo "Found $ASSET_COUNT of $EXPECTED_PACKAGES expected packages"

            if [ "$ASSET_COUNT" -ge "$EXPECTED_PACKAGES" ]; then
              echo "All packages available — downloading."
              (cd tarballs && gh release download "$RELEASE_TAG" --repo "$REPO" --pattern "*.tgz" --clobber)
              break
            fi

            if [ $attempt -eq $MAX_RETRIES ]; then
              echo "Timeout: only $ASSET_COUNT of $EXPECTED_PACKAGES packages attached to release ${RELEASE_TAG} after $((MAX_RETRIES * RETRY_DELAY))s" >&2
              exit 1
            fi

            sleep $RETRY_DELAY
            attempt=$((attempt + 1))
          done

          echo "Downloaded tarballs:"
          ls -lh tarballs/*.tgz

      - name: Publish packages to npm
        env:
          # Public repo — provenance attestation enabled (npm >= 11.5.1).
          NPM_CONFIG_PROVENANCE: true
        run: |
          set -euo pipefail
          cd tarballs
          for tarball in *.tgz; do
            echo "----------------------------------------"
            echo "Publishing: $tarball"
            npm publish "$tarball" --access public --tag latest --provenance --verbose
            echo "✅ Published: $tarball"
          done

      - name: Job summary
        if: always()
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          {
            echo "# npm publish results"
            echo ""
            echo "**Tag:** \`${RELEASE_TAG}\`"
            echo ""
            echo "Published via [npm Trusted Publishers](https://docs.npmjs.com/trusted-publishers)"
          } >> "$GITHUB_STEP_SUMMARY"