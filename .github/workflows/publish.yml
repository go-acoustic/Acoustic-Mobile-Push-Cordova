name: Publish to npm

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: read
      id-token: write  # Required for OIDC

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Get release information
        id: release-info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_INFO=$(gh api repos/${{ github.repository }}/releases/tags/${{ github.event.release.tag_name }})
          echo "release_info<<EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_INFO" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Wait for all tarballs to be uploaded (prevents race condition)
      - name: Wait for all tarballs to be uploaded
        id: wait-for-tarballs
        timeout-minutes: 10
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MAX_RETRIES=60
          RETRY_DELAY=10
          attempt=1

          # Extract expected package count from release body metadata
          RELEASE_INFO='${{ steps.release-info.outputs.release_info }}'
          EXPECTED_PACKAGES=$(echo "$RELEASE_INFO" | jq -r '.body' | grep -oP '(?<=EXPECTED_PACKAGES:\s)\d+' || echo "1")

          echo "Expecting $EXPECTED_PACKAGES package(s)"

          while [ $attempt -le $MAX_RETRIES ]; do
            echo "Attempt $attempt/$MAX_RETRIES - Checking for tarballs..."

            RELEASE_INFO=$(gh api repos/${{ github.repository }}/releases/tags/${{ github.event.release.tag_name }})
            CURRENT_ASSET_COUNT=$(echo "$RELEASE_INFO" | jq '(.assets // []) | [.[] | select(.name | endswith(".tgz"))] | length')

            echo "Found $CURRENT_ASSET_COUNT of $EXPECTED_PACKAGES expected packages"

            if [ "$CURRENT_ASSET_COUNT" -ge "$EXPECTED_PACKAGES" ]; then
              echo "✅ All $EXPECTED_PACKAGES packages are now available"
              break
            fi

            if [ $attempt -eq $MAX_RETRIES ]; then
              echo "❌ Timeout: Only $CURRENT_ASSET_COUNT of $EXPECTED_PACKAGES packages uploaded after $((MAX_RETRIES * RETRY_DELAY)) seconds"
              exit 1
            fi

            sleep $RETRY_DELAY
            attempt=$((attempt + 1))
          done

      - name: Download tarballs from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p tarballs
          cd tarballs

          gh release download ${{ github.event.release.tag_name }} \
            --repo ${{ github.repository }} \
            --pattern "*.tgz"

          echo "Downloaded tarballs:"
          ls -lh *.tgz

      - name: Publish packages to npm with provenance
        id: publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set +e  # Don't exit on error

          SUCCESS_COUNT=0
          FAILURE_COUNT=0
          PUBLISHED_PACKAGES=""
          FAILED_PACKAGES=""

          # Change to tarballs directory to avoid path confusion
          cd tarballs

          for tarball in *.tgz; do
            echo "----------------------------------------"
            echo "Publishing: $tarball"

            # Publish with provenance (public packages only)
            if npm publish "$tarball" \
              --provenance \
              --access public \
              2>&1 | tee publish_output.txt; then

              echo "✅ Successfully published: $tarball"
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              PUBLISHED_PACKAGES="${PUBLISHED_PACKAGES}✅ $tarball\n"
            else
              echo "❌ Failed to publish: $tarball"
              FAILURE_COUNT=$((FAILURE_COUNT + 1))
              FAILED_PACKAGES="${FAILED_PACKAGES}❌ $tarball\n"
              cat publish_output.txt
            fi
          done

          echo "----------------------------------------"
          echo "📊 Publishing Summary:"
          echo "  ✅ Successful: $SUCCESS_COUNT"
          echo "  ❌ Failed: $FAILURE_COUNT"

          # Save results to output for summary
          {
            echo "success_count=$SUCCESS_COUNT"
            echo "failure_count=$FAILURE_COUNT"
            echo "published_list<<EOF"
            echo -e "$PUBLISHED_PACKAGES"
            echo "EOF"
            echo "failed_list<<EOF"
            echo -e "$FAILED_PACKAGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Exit with error if any packages failed
          if [ $FAILURE_COUNT -gt 0 ]; then
            exit 1
          fi

      - name: Create job summary
        if: always()
        run: |
          echo "# 📦 npm Publishing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** ${{ github.event.release.tag_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.publish.outputs.success_count }}" != "" ]; then
            echo "## ✅ Successfully Published (${{ steps.publish.outputs.success_count }})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.publish.outputs.published_list }}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.publish.outputs.failure_count }}" != "0" ] && [ "${{ steps.publish.outputs.failure_count }}" != "" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "## ❌ Failed to Publish (${{ steps.publish.outputs.failure_count }})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.publish.outputs.failed_list }}" >> $GITHUB_STEP_SUMMARY
          fi
